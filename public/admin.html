<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma Social — Admin</title>
<style>
  :root{--bg:#0F1015;--surface:#171923;--surface2:#1F2230;--ink:#E9EBF1;
    --soft:#878DA0;--accent:#4F7CFF;--danger:#E5556B;--green:#3ECf8E;
    --amber:#FFB020;--line:rgba(255,255,255,.08)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .screen{display:none}.screen.on{display:block}
  .badge{display:inline-flex;width:36px;height:36px;border-radius:10px;
    align-items:center;justify-content:center;font-weight:800;color:#fff;
    background:linear-gradient(135deg,#6E92FF,#2D5BFF);font-size:18px}
  .row{display:flex;align-items:center;gap:10px}.muted{color:var(--soft)}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:10px;
    padding:11px 16px;font-weight:700;cursor:pointer;font-size:14px}
  .btn.ghost{background:var(--surface2);color:var(--ink)}
  .btn.sm{padding:7px 11px;font-size:12.5px;border-radius:8px}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid rgba(229,85,107,.4)}
  .btn.warn{background:transparent;color:var(--amber);border:1px solid rgba(255,176,32,.4)}
  .btn.ok{background:transparent;color:var(--green);border:1px solid rgba(62,207,142,.4)}
  input{width:100%;background:var(--surface2);border:1px solid var(--line);
    color:var(--ink);border-radius:10px;padding:11px 14px;font-size:15px;outline:none}
  input:focus{border-color:var(--accent)}
  .err{color:var(--danger);font-size:13px;min-height:18px;margin-top:8px}
  #login{min-height:100vh;display:none;align-items:center;justify-content:center;padding:20px}
  #login.on{display:flex}
  .loginCard{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:22px;width:340px}
  .topbar{position:sticky;top:0;z-index:5;background:rgba(15,16,21,.9);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:12px 18px}
  .wrap{max-width:1020px;margin:0 auto;padding:16px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(104px,1fr));gap:10px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center}
  .stat b{font-size:24px;display:block}.stat span{color:var(--soft);font-size:12px}
  .stat.online b{color:var(--green)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;
    margin-right:6px;box-shadow:0 0 8px var(--green)}
  .tabs{display:flex;gap:8px;margin:16px 0 10px;flex-wrap:wrap}
  .tab{background:var(--surface2);color:var(--soft);border:0;border-radius:10px;
    padding:9px 16px;cursor:pointer;font-weight:600}
  .tab.on{background:var(--accent);color:#fff}
  .item{display:flex;align-items:center;gap:10px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px;flex-wrap:wrap}
  .grow{flex:1;min-width:160px}
  .name{font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .sub{color:var(--soft);font-size:12px}
  .thumb{width:46px;height:46px;border-radius:9px;object-fit:cover;border:1px solid var(--line)}
  .pill{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700}
  .pill.admin{color:var(--accent);background:rgba(79,124,255,.18)}
  .pill.ban{color:var(--danger);background:rgba(229,85,107,.18)}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .ver{width:16px;height:16px;vertical-align:-3px}
</style>
</head>
<body>

<div id="login" class="on">
  <div class="loginCard">
    <div class="row" style="margin-bottom:16px">
      <div class="badge">Σ</div>
      <div><div style="font-weight:800;font-size:17px">Sigma Admin</div>
        <div class="muted" style="font-size:12px">Admins only</div></div>
    </div>
    <input id="u" placeholder="Username" autocomplete="username"/>
    <div style="height:10px"></div>
    <input id="p" type="password" placeholder="Password" autocomplete="current-password"/>
    <div class="err" id="loginErr"></div>
    <button class="btn" style="width:100%;margin-top:6px" onclick="login()">Sign in</button>
  </div>
</div>

<div id="dash" class="screen">
  <div class="topbar">
    <div class="row"><div class="badge">Σ</div><div style="font-weight:800">Sigma Admin</div></div>
    <div class="row">
      <button class="btn sm" onclick="runBotsNow()">🤖 Run bots</button>
      <button class="btn ghost sm" onclick="loadAll()">Refresh</button>
      <button class="btn ghost sm" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="wrap">
    <div class="stats" id="stats"></div>
    <div style="margin-top:14px">
      <input id="search" placeholder="🔍 Search by username, email or text…" oninput="render()"/>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="list"></div>
  </div>
</div>

<script>
const API='/api';
let token=localStorage.getItem('admin_token')||'';
const H=()=>token?{'Authorization':'Bearer '+token}:{};
const TABS=['users','posts','comments','stories','reels'];
let tab='users';
const D={users:[],posts:[],comments:[],stories:[],reels:[]};

const VER='<svg class="ver" viewBox="0 0 24 24"><path fill="#4F7CFF" d="M12 1l2.4 1.9 3-.3 1.1 2.8 2.8 1.4-.8 2.9.9 2.9-2.8 1.5-1.1 2.8-3-.4L12 23l-2.5-1.9-3 .4-1.1-2.8L2.6 16l.9-2.9-.8-2.9 2.8-1.4L6.6 2.6l3 .3z"/><path fill="#fff" d="M10.5 14.7l-2.3-2.3-1.2 1.2 3.5 3.5 6.2-6.2-1.2-1.2z"/></svg>';

function show(el,on){const e=document.getElementById(el);
  e.style.display=on?(el==='login'?'flex':'block'):'none';e.classList.toggle('on',on);}
function logout(){token='';localStorage.removeItem('admin_token');show('dash',false);show('login',true);}
function enter(){show('login',false);show('dash',true);buildTabs();loadAll();}

async function login(){
  const u=document.getElementById('u').value.trim(),p=document.getElementById('p').value;
  const err=document.getElementById('loginErr');err.textContent='';
  try{
    const r=await fetch(API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p})});
    const j=await r.json();
    if(j.success!==true){err.textContent=j.error||'Login failed';return;}
    if(j.data.user.is_admin!==true){err.textContent='This account is not an admin.';return;}
    token=j.data.token;localStorage.setItem('admin_token',token);enter();
  }catch(e){err.textContent='Connection error';}
}

function buildTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>
    `<button class="tab ${t===tab?'on':''}" onclick="setTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</button>`).join('');
}
function setTab(t){tab=t;buildTabs();render();}

async function api(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:{...H(),...(opts.headers||{})}});
  if(r.status===401||r.status===403){logout();throw new Error('unauth');}
  return r.json();
}
const jpost=(p,b)=>api(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});
const jdel=(p,b)=>api(p,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify(b||{})});

async function loadAll(){
  try{
    const [s,u,p,c,st,re]=await Promise.all([api('/admin/stats'),api('/admin/users'),
      api('/admin/posts'),api('/admin/comments'),api('/admin/stories'),api('/admin/reels')]);
    renderStats(s.data||{});
    D.users=u.data||[];D.posts=p.data||[];D.comments=c.data||[];D.stories=st.data||[];D.reels=re.data||[];
    render();
  }catch(e){}
}
function esc(s){return (s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function renderStats(d){
  document.getElementById('stats').innerHTML=
    `<div class="stat online"><b><span class="dot"></span>${d.online??0}</b><span>Online</span></div>`+
    [['Users','users'],['Posts','posts'],['Comments','comments'],['Messages','messages'],
     ['Stories','stories'],['Reels','reels']].map(m=>
     `<div class="stat"><b>${d[m[1]]??0}</b><span>${m[0]}</span></div>`).join('');
}

function q(){return document.getElementById('search').value.trim().toLowerCase();}
function match(text){const s=q();return !s|| (text||'').toLowerCase().includes(s);}

function render(){
  const el=document.getElementById('list');
  if(tab==='users') el.innerHTML=renderUsers();
  else if(tab==='posts') el.innerHTML=renderMedia(D.posts,'posts');
  else if(tab==='comments') el.innerHTML=renderMedia(D.comments,'comments');
  else if(tab==='stories') el.innerHTML=renderMedia(D.stories,'stories');
  else if(tab==='reels') el.innerHTML=renderMedia(D.reels,'reels');
}

function renderUsers(){
  const rows=D.users.filter(u=>match(u.username)||match(u.email)).map(u=>{
    const pills=(u.is_admin?'<span class="pill admin">admin</span>':'')+
      (u.is_banned?'<span class="pill ban">blocked</span>':'');
    return `<div class="item">
      <div class="grow"><div class="name">@${esc(u.username)} ${u.is_verified?VER:''} ${pills}</div>
        <div class="sub">${esc(u.email)}</div></div>
      <div class="actions">
        <button class="btn ok sm" onclick="verify('${u.id}')">${u.is_verified?'Unverify':'Verify'}</button>
        ${u.is_banned?`<button class="btn warn sm" onclick="unban('${u.id}')">Unblock</button>`
          :`<button class="btn warn sm" onclick="ban('${u.id}','${esc(u.username)}')">Block</button>`}
        <button class="btn ghost sm" onclick="adm('${u.id}')">${u.is_admin?'Unadmin':'Make admin'}</button>
        <button class="btn danger sm" onclick="delUser('${u.id}','${esc(u.username)}')">Delete</button>
      </div></div>`;});
  return rows.join('')||'<div class="muted">Nothing found</div>';
}

function renderMedia(list,kind){
  const rows=list.filter(x=>match(x.username)||match(x.content)||match(x.caption)).map(x=>{
    const img=x.image_url?`<img class="thumb" src="${esc(x.image_url)}">`:'';
    const vid=x.video_url?`<a class="btn ghost sm" href="${esc(x.video_url)}" target="_blank">▶ video</a>`:'';
    const text=kind==='reels'?(x.caption||'') : (x.content||'');
    const body=kind==='stories'?'<span class="muted">[story]</span>':(esc(text)||'<span class="muted">[no text]</span>');
    const ep = kind==='posts'?'posts':kind==='comments'?'comments':kind==='stories'?'stories':'reels';
    const reason = (kind==='posts'||kind==='comments');
    return `<div class="item">
      ${img}
      <div class="grow"><div class="sub">@${esc(x.username)}</div>
        <div style="margin-top:4px">${body}</div></div>
      ${vid}
      <button class="btn danger sm" onclick="del('${ep}','${x.id}',${reason})">Delete</button>
    </div>`;});
  return rows.join('')||'<div class="muted">Nothing found</div>';
}

async function verify(id){await jpost('/admin/users/'+id+'/verify');loadAll();}
async function ban(id,name){const r=prompt('Reason for blocking @'+name+' (user will be notified):');
  if(r===null)return;await jpost('/admin/users/'+id+'/ban',{reason:r});loadAll();}
async function unban(id){await jpost('/admin/users/'+id+'/unban');loadAll();}
async function adm(id){await jpost('/admin/users/'+id+'/toggle-admin');loadAll();}
async function delUser(id,name){if(!confirm('Permanently delete @'+name+' and ALL their content?'))return;
  const j=await jdel('/admin/users/'+id);if(j.success!==true)alert(j.error||'Failed');loadAll();}
async function del(ep,id,withReason){
  let reason='';
  if(withReason){const r=prompt('Reason (the author will be notified):');if(r===null)return;reason=r;}
  else if(!confirm('Delete this item?'))return;
  await jdel('/admin/'+ep+'/'+id,{reason});loadAll();
}

if(token){enter();}
</script>
</body>
</html>
