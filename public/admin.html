<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma Social — Admin</title>
<style>
  :root{
    --bg:#0F1015; --surface:#171923; --surface2:#1F2230;
    --ink:#E9EBF1; --soft:#878DA0; --accent:#4F7CFF; --danger:#E5556B;
    --green:#3ECf8E; --amber:#FFB020; --line:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .screen{display:none}
  .screen.on{display:block}
  .badge{display:inline-flex;width:36px;height:36px;border-radius:10px;
    align-items:center;justify-content:center;font-weight:800;color:#fff;
    background:linear-gradient(135deg,#6E92FF,#2D5BFF);font-size:18px}
  .row{display:flex;align-items:center;gap:10px}
  .muted{color:var(--soft)}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:10px;
    padding:11px 16px;font-weight:700;cursor:pointer;font-size:14px}
  .btn.ghost{background:var(--surface2);color:var(--ink)}
  .btn.sm{padding:7px 11px;font-size:12.5px;border-radius:8px}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid rgba(229,85,107,.4)}
  .btn.warn{background:transparent;color:var(--amber);border:1px solid rgba(255,176,32,.4)}
  .btn.ok{background:transparent;color:var(--green);border:1px solid rgba(62,207,142,.4)}
  input{width:100%;background:var(--surface2);border:1px solid var(--line);
    color:var(--ink);border-radius:10px;padding:12px 14px;font-size:15px;outline:none}
  input:focus{border-color:var(--accent)}
  .err{color:var(--danger);font-size:13px;min-height:18px;margin-top:8px}

  /* login */
  #login{min-height:100vh;display:none;align-items:center;justify-content:center;padding:20px}
  #login.on{display:flex}
  .loginCard{background:var(--surface);border:1px solid var(--line);
    border-radius:18px;padding:22px;width:340px}

  /* dashboard */
  .topbar{position:sticky;top:0;z-index:5;background:rgba(15,16,21,.85);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 18px}
  .wrap{max-width:1000px;margin:0 auto;padding:18px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:14px;text-align:center}
  .stat b{font-size:24px;display:block}
  .stat span{color:var(--soft);font-size:12px}
  .stat.online b{color:var(--green)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);
    display:inline-block;margin-right:6px;box-shadow:0 0 8px var(--green)}
  .tabs{display:flex;gap:8px;margin:18px 0 12px}
  .tab{background:var(--surface2);color:var(--soft);border:0;border-radius:10px;
    padding:9px 18px;cursor:pointer;font-weight:600}
  .tab.on{background:var(--accent);color:#fff}
  .item{display:flex;align-items:center;gap:8px;background:var(--surface);
    border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;
    flex-wrap:wrap}
  .item .grow{flex:1;min-width:160px}
  .name{font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .sub{color:var(--soft);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pill{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700}
  .pill.admin{color:var(--accent);background:rgba(79,124,255,.18)}
  .pill.ver{color:var(--green);background:rgba(62,207,142,.18)}
  .pill.ban{color:var(--danger);background:rgba(229,85,107,.18)}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="on">
  <div class="loginCard">
    <div class="row" style="margin-bottom:16px">
      <div class="badge">Σ</div>
      <div><div style="font-weight:800;font-size:17px">Sigma Admin</div>
        <div class="muted" style="font-size:12px">Admins only</div></div>
    </div>
    <input id="u" placeholder="Username" autocomplete="username"/>
    <div style="height:10px"></div>
    <input id="p" type="password" placeholder="Password" autocomplete="current-password"/>
    <div class="err" id="loginErr"></div>
    <button class="btn" style="width:100%;margin-top:6px" onclick="login()">Sign in</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="screen">
  <div class="topbar">
    <div class="row"><div class="badge">Σ</div>
      <div style="font-weight:800">Sigma Admin</div></div>
    <div class="row">
      <button class="btn ghost sm" onclick="loadAll()">Refresh</button>
      <button class="btn ghost sm" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="wrap">
    <div class="stats" id="stats"></div>
    <div class="tabs">
      <button class="tab on" id="tabUsers" onclick="showTab('users')">Users</button>
      <button class="tab" id="tabPosts" onclick="showTab('posts')">Posts</button>
    </div>
    <div id="usersList"></div>
    <div id="postsList" style="display:none"></div>
  </div>
</div>

<script>
const API='/api';
let token=localStorage.getItem('admin_token')||'';
const H=()=>token?{'Authorization':'Bearer '+token}:{};

function show(el,on){document.getElementById(el).classList.toggle('on',on);
  document.getElementById(el).style.display = on?(el==='login'?'flex':'block'):'none';}

async function login(){
  const u=document.getElementById('u').value.trim();
  const p=document.getElementById('p').value;
  const err=document.getElementById('loginErr'); err.textContent='';
  try{
    const r=await fetch(API+'/auth/login',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const j=await r.json();
    if(j.success!==true){err.textContent=j.error||'Login failed';return;}
    if(j.data.user.is_admin!==true){err.textContent='This account is not an admin.';return;}
    token=j.data.token; localStorage.setItem('admin_token',token); enter();
  }catch(e){err.textContent='Connection error';}
}
function logout(){token='';localStorage.removeItem('admin_token');show('dash',false);show('login',true);}
function enter(){show('login',false);show('dash',true);loadAll();}

function showTab(t){
  document.getElementById('tabUsers').classList.toggle('on',t==='users');
  document.getElementById('tabPosts').classList.toggle('on',t==='posts');
  document.getElementById('usersList').style.display=t==='users'?'block':'none';
  document.getElementById('postsList').style.display=t==='posts'?'block':'none';
}

async function api(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:{...H(),...(opts.headers||{})}});
  if(r.status===401||r.status===403){logout();throw new Error('unauth');}
  return r.json();
}
async function jpost(path,body){return api(path,{method:'POST',
  headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});}
async function jdel(path,body){return api(path,{method:'DELETE',
  headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});}

async function loadAll(){
  try{
    const [s,u,p]=await Promise.all([api('/admin/stats'),api('/admin/users'),api('/admin/posts')]);
    renderStats(s.data||{}); renderUsers(u.data||[]); renderPosts(p.data||[]);
  }catch(e){}
}
function esc(s){return (s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function renderStats(d){
  document.getElementById('stats').innerHTML=
    `<div class="stat online"><b><span class="dot"></span>${d.online??0}</b><span>Online</span></div>`+
    [['Users','users'],['Posts','posts'],['Comments','comments'],['Messages','messages'],
     ['Stories','stories'],['Reels','reels']].map(m=>
     `<div class="stat"><b>${d[m[1]]??0}</b><span>${m[0]}</span></div>`).join('');
}

function renderUsers(list){
  document.getElementById('usersList').innerHTML=list.map(u=>{
    const pills=(u.is_admin?'<span class="pill admin">admin</span>':'')+
      (u.is_verified?'<span class="pill ver">✓ verified</span>':'')+
      (u.is_banned?'<span class="pill ban">blocked</span>':'');
    return `<div class="item">
      <div class="grow">
        <div class="name">@${esc(u.username)} ${pills}</div>
        <div class="sub">${esc(u.email)}</div>
      </div>
      <div class="actions">
        <button class="btn ok sm" onclick="verify('${u.id}')">${u.is_verified?'Unverify':'Verify ✓'}</button>
        ${u.is_banned
          ? `<button class="btn warn sm" onclick="unban('${u.id}')">Unblock</button>`
          : `<button class="btn warn sm" onclick="ban('${u.id}','${esc(u.username)}')">Block</button>`}
        <button class="btn ghost sm" onclick="adminToggle('${u.id}')">${u.is_admin?'Unadmin':'Make admin'}</button>
        <button class="btn danger sm" onclick="delUser('${u.id}','${esc(u.username)}')">Delete</button>
      </div>
    </div>`;}).join('')||'<div class="muted">No users</div>';
}

function renderPosts(list){
  document.getElementById('postsList').innerHTML=list.map(p=>`
    <div class="item">
      <div class="grow">
        <div class="sub">@${esc(p.username)}</div>
        <div style="margin-top:4px">${esc(p.content)||'<span class="muted">[no text]</span>'}</div>
      </div>
      <button class="btn danger sm" onclick="delPost('${p.id}')">Delete</button>
    </div>`).join('')||'<div class="muted">No posts</div>';
}

async function verify(id){await jpost('/admin/users/'+id+'/verify');loadAll();}
async function ban(id,name){
  const reason=prompt('Reason for blocking @'+name+' (the user will be notified):');
  if(reason===null)return;
  await jpost('/admin/users/'+id+'/ban',{reason});loadAll();
}
async function unban(id){await jpost('/admin/users/'+id+'/unban');loadAll();}
async function adminToggle(id){await jpost('/admin/users/'+id+'/toggle-admin');loadAll();}
async function delUser(id,name){
  if(!confirm('Permanently delete @'+name+' and ALL their content?'))return;
  const j=await jdel('/admin/users/'+id);
  if(j.success!==true)alert(j.error||'Failed');loadAll();
}
async function delPost(id){
  const reason=prompt('Reason for removing this post (the author will be notified):');
  if(reason===null)return;
  await jdel('/admin/posts/'+id,{reason});loadAll();
}

if(token){enter();}
</script>
</body>
</html>
